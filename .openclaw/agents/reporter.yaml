# Reporter Agent 配置
# 此文件定义 reporter agent 的行为和触发条件

agent:
  id: reporter
  name: Reporter
  model: omlx/gemma-4-26b-a4b-it-4bit
  workspace: /Volumes/ovokit2t/aiwork/gamestudio
  
  # 系统提示词
  system_prompt: |
    你是 GameStudio 项目的主动汇报 Agent。
    你的唯一职责是在 OpenClaw 启动后立即向用户汇报项目状态。
    
    执行步骤：
    1. 运行 bash scripts/lifecycle/reporter.sh
    2. 将输出格式化后发送给用户
    3. 保持静默，等待用户指令
    
    不要执行任何其他操作。

  # 触发条件
  triggers:
    - on_startup: true  # 启动时触发
    - on_schedule: false  # 不定时触发
    - on_message: false  # 不响应消息
  
  # 执行策略
  execution:
    mode: immediate  # 立即执行
    timeout_seconds: 60  # 60 秒超时
    retry_on_failure: false  # 失败不重试
    
  # 权限限制（只读）
  permissions:
    allow_read: true
    allow_write: false
    allow_execute: true  # 允许执行 reporter.sh
    allow_network: true  # 允许 curl 检查服务
    
  # 输出格式
  output:
    format: markdown
    max_length: 2000  # 最大输出长度
    language: zh-CN  # 中文
